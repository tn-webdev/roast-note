<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>🫘Roast Note</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
</head>
<body>
  <h1>🫘Roast Note</h1>

  <button id="data-btn" class="sub-btn">⚙️データ管理</button>
  
  <!-- ===================== -->
  <!-- 検索フォーム -->
  <!-- ===================== -->
  <!--検索欄・タイトル・入力フォームを同一幅で揃えるための共通コンテナ -->
  <div class="content-wrap">
    <input
      type="text"
      id="searchInput"
      placeholder="名前 or コメントで検索"
    />
      
    <!-- ===================== -->
    <!-- 入力フォーム -->
    <!-- ===================== -->
    <h2 class="special-title" id="form-title">新規登録</h2>

    <form id="note-form">
      <input type="text" id="name" placeholder="コーヒー名" /><br>
      <input type="text" id="origin" placeholder="産地（例：インドネシア・バリ島）" /><br>

      <div>
        <textarea id="comment" class="form-textarea" placeholder="感想" rows="10"></textarea>
      </div>

      <select id="roast">
        <option value="">焙煎度</option>
        <option value="light">浅煎り（ライト：-20秒）</option>
        <option value="cinnamon">浅煎り（シナモン：-10秒）</option>
        <option value="medium">中煎り（ミディアム：標準）</option>
        <option value="high">中煎り（ハイ：+20秒）</option>
        <option value="city">深煎り（シティ以上：+40秒～）</option>
      </select><br>

      <div>
        ★評価：
        <label><input type="radio" name="rating" value="1">1</label>
        <label><input type="radio" name="rating" value="2">2</label>
        <label><input type="radio" name="rating" value="3">3</label>
        <label><input type="radio" name="rating" value="4">4</label>
        <label><input type="radio" name="rating" value="5">5</label>
      </div><br>
      
      <button type="submit" id="submit-btn">保存</button>
    </form>
  </div>

  <!-- ===================== -->
  <!-- 一覧表示 -->
  <!-- ===================== -->
  <div id="output"></div>

  <!-- ===================== -->
  <!--   db.js, ui.js 読み込み追加 -->
  <!-- ===================== -->
  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  
</body>
</html>
