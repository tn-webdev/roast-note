<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>🫘Roast Note</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
</head>
<body>
  <h1>🫘Roast Note</h1>

  <button id="data-btn" class="sub-btn">⚙️データ管理</button>
  
  <!-- ===================== -->
  <!-- 検索フォーム -->
  <!-- ===================== -->
  <!--検索欄・タイトル・入力フォームを同一幅で揃えるための共通コンテナ -->
  <div class="content-wrap">
    <input
      type="text"
      id="searchInput"
      placeholder="名前 or コメントで検索"
    />
      
    <!-- ===================== -->
    <!-- 入力フォーム -->
    <!-- ===================== -->
    <h2 class="special-title" id="form-title">新規登録</h2>

    <form id="note-form">
      <input type="text" id="name" placeholder="コーヒー名" /><br>
      <input type="text" id="origin" placeholder="産地（例：インドネシア・バリ島）" /><br>

      <div>
        <textarea id="comment" class="form-textarea" placeholder="感想" rows="10"></textarea>
      </div>

      <select id="roast">
        <option value="">焙煎度</option>
        <option value="light">浅煎り（ライト：-20秒）</option>
        <option value="cinnamon">浅煎り（シナモン：-10秒）</option>
        <option value="medium">中煎り（ミディアム：標準）</option>
        <option value="high">中煎り（ハイ：+20秒）</option>
        <option value="city">深煎り（シティ以上：+40秒～）</option>
      </select><br>

      <div>
        ★評価：
        <label><input type="radio" name="rating" value="1">1</label>
        <label><input type="radio" name="rating" value="2">2</label>
        <label><input type="radio" name="rating" value="3">3</label>
        <label><input type="radio" name="rating" value="4">4</label>
        <label><input type="radio" name="rating" value="5">5</label>
      </div><br>
      
      <button type="submit" id="submit-btn">保存</button>
    </form>
  </div>

  <!-- ===================== -->
  <!-- 一覧表示 -->
  <!-- ===================== -->
  <div id="output"></div>

  <!-- ===================== -->
  <!-- DB処理 -->
  <!-- ===================== -->
  <script>
    // RoastNoteの準備
    const DB_NAME = "RoastNote";
    const DB_VERSION = 1;
    const STORE_NAME = "notes";         // オブジェクトストア

    let currentEditId = null;           // 編集用グローバル変数

    // RoastNoteを開く
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);  // DBオープン依頼とアップグレード処理

        // 初回 or バージョンアップ時の処理
        request.onupgradeneeded = (event) => {
          const db = event.target.result;

          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, {
              keyPath: "id",    // 主キー
            });

            store.createIndex("createdAt", "createdAt");
          }
        };

        request.onsuccess = () => resolve(request.result);    // 成功
        request.onerror = () => reject(request.error);        // 失敗
      });
    }

    // 1件のノートをIndexdDBに保存
    async function saveNote(note) {
      const db = await openDB();

      const tx = db.transaction(STORE_NAME, "readwrite");     // 読み書き可能なトランザクションを開始
      const store = tx.objectStore(STORE_NAME);               // 対象のオブジェクトストア（テーブル）を取得

      // 編集モードか否かの判定
      if (currentEditId) {
        note.id = currentEditId;      // 編集モードの場合：既存データを上書きするためidをセット
        store.put(note);              // put()→既存なら上書き、新規なら追加
        currentEditId = null;         // 編集完了。フラグリセット
      } else {
        store.add(note);              // 新規作成の場合、新規データとして保存
      }

      return new Promise((resolve, reject) => {               // 保存完了を待つ
        tx.oncomplete = () => resolve();                      // 正常時
        tx.onerror = () => reject(tx.error);                  // 失敗時
      });
    }

    // RoastNoteから「notes（メモ）」を全部読み出して配列として返す
    async function getAllNotes() {
      const db = await openDB();

      const tx = db.transaction(STORE_NAME, "readonly");      //ストアを読み取り専用で開く
      const store = tx.objectStore(STORE_NAME);

      const request = store.getAll();                         // ストア内のすべてのデータを読み出すリクエストを作成

      return new Promise((resolve, reject) => {               // ストア内のすべてのデータを取得
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    // DOM（ページの構造データ）読み込み後に実行
    document.getElementById("note-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const rating = document.querySelector('input[name="rating"]:checked')?.value;

      const data = {
        id: crypto.randomUUID(),
        name: document.getElementById("name").value,
        comment: document.getElementById("comment").value,
        rating: rating ? Number(rating) : null,
        roast: document.getElementById("roast").value,
        origin: document.getElementById("origin").value,
        createdAt: new Date().toISOString()
      };

      if (!data.name) {
        alert("コーヒー名は必須だよ🤖☕️");
        return;
      }

      await saveNote(data); // 保存

      console.log("保存OK", data);

      // フォームリセット
      e.target.reset();

      // 編集モード解除（UIリセット）
      document.getElementById("form-title").textContent = "新規登録";
      document.getElementById("submit-btn").textContent = "保存";

      // 検索リセット
      document.getElementById("searchInput").value = "";

      // 最後に1回だけ再描画
      renderNotes();

    });

      // =====================
      // フォーマット系
      // =====================
      function formatRoast(roast) {
        const map = {
          light: "浅煎り（ライト：-20秒）",
          cinnamon: "浅煎り（シナモン：-10秒）",
          medium: "中煎り（ミディアム：標準）",
          high: "中煎り（ハイ：+20秒）",
          city: "深煎り（シティ以上：+40秒～）"
        };
        return map[roast] || "不明";
      }

      // =====================
      // UI描画（検索対応版）
      // =====================
      async function renderNotes(keyword = "") {
        const notes = await getAllNotes();                                // 全ノート取得
        const output = document.getElementById("output");                 // 描画先の要素取得

        output.innerHTML = "";                                            // リセット

        // 検索キーワードを小文字化（大文字小文字を区別しない）
        const lowerKeyword = keyword.toLowerCase();

        // フィルタ処理（name + comment 部分一致）
        let filtered;

        if (!lowerKeyword) {
          // 検索なし → 全件表示
          filtered = notes;
        } else {
          // 検索あり → フィルタ
          filtered = notes.filter(note => {
            return (
              note.name?.toLowerCase().includes(lowerKeyword) ||
              note.comment?.toLowerCase().includes(lowerKeyword)
            );
          });
        }
        // 該当なしの場合
        if (filtered.length === 0) {
          output.innerHTML = "<p>該当なし🤖☕️</p>";
          return;
        }

        // 作成日の新しい順に並べ替え
        filtered.sort((a, b) => b.createdAt.localeCompare(a.createdAt));

        // =====================
        // ノート描画処理
        // =====================
        filtered.forEach(note => {
          // カードの外枠
          const div = document.createElement("div");
          div.className = "note-card";

          // カード本体のHTML
          div.innerHTML = `
            <div class="top">☕️ ${note.name ?? "（未入力）"}</div>

            <div class="sub">
              ${formatRoast(note.roast)} / ⭐ <strong>${note.rating ?? "-"}</strong>
            </div>

            <div class="comment">
              ${note.comment ?? "なし"}
            </div>

            ${note.origin ? `<div class="origin">${note.origin}</div>` : ""}
          `;

          // =====================
          // ボタン類（削除・編集）
          // =====================
          // 削除ボタン
          const button = document.createElement("button");
          button.textContent = "削除";
          button.addEventListener("click", () => deleteNote(note.id));

          // 編集ボタン
          const editBtn = document.createElement("button");
          editBtn.textContent = "編集";
          editBtn.addEventListener("click", () => editNote(note.id));

          // ボタンをまとめるラッパー
          const btnWrapper = document.createElement("div");
          btnWrapper.className = "btn-group";

          btnWrapper.appendChild(editBtn);
          btnWrapper.appendChild(button);

          div.appendChild(btnWrapper);        // カードにボタンを追加
          output.appendChild(div);            // 最終的に output に追加
        });
      }
     
      // =====================
      // 削除処理
      // =====================
      async function deleteNote(id) {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);

        store.delete(id);                                         // 指定したidのデータ削除

        await new Promise((resolve, reject) => {                  // トランザクション完了まで待機
          tx.oncomplete = resolve;                                // 正常時
          tx.onerror = () => reject(tx.error);                    // 失敗時
        });

        renderNotes();
      }

      // =====================
      // 編集処理
      // =====================
      async function editNote(id) {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, "readonly");        // 読み取り専用トランザクションを開始
        const store = tx.objectStore(STORE_NAME);

        const req = store.get(id);                                // 指定されたidのデータを取得するリクエストを送る

        req.onsuccess = () => {
          // 成功時
          const data = req.result;

          document.getElementById("name").value = data.name;
          document.getElementById("comment").value = data.comment;
          document.getElementById("roast").value = data.roast;
          document.getElementById("origin").value = data.origin;

          // ラジオボタン(rating)の対応
          if (data.rating) {
            document.querySelector(`input[name="rating"][value="${data.rating}"]`).checked = true;
          }

          currentEditId = id;       // 編集中のノートのIDを保存（保存ボタン押下時「更新」扱いとするため）

          // UI変更（編集モード表示）
          document.getElementById("form-title").textContent = "✏️ 編集中";
          document.getElementById("submit-btn").textContent = "更新";

        };
      }     

      renderNotes();
      
      // =====================
      // 検索イベント
      // =====================
      const searchInput = document.getElementById("searchInput");

      searchInput.addEventListener("input", (e) => {
        const keyword = e.target.value;
        renderNotes(keyword);
      });

      // データ管理
      document.getElementById("data-btn").addEventListener("click", () => {
        location.href = "data.html";
      });

  </script>
</body>
</html>
